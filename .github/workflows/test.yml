# This is a basic workflow to help you get started with Actions

name: DevOps_Insiders_Infra   # Name of the Workflow

# Controls when the workflow will run
on:
                    # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
  #   branches:
  #     - "main"
  #     - featureBranch
  pull_request:
    branches:
      - main 

jobs:   #---highest structure to design workflow or pipeline in github as cpmapred ADO in which Stages considered top.

  build:
   
    runs-on: ubuntu-latest  # Runners like Agents in ADO  = GitHub Servers

    steps:
     # - task: in ADO 
      - uses: actions/checkout@v4   # Importance of Checkout 

      # Runs a single command using the runners shell
      - name: Run a one-line script        # DisplayName of task
        run: echo Hello, DevOps Insiders!  # run is script property

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |                             # | ----> used to add multiple scripts
          echo Add other actions to build,
          echo test, and deploy your project.
